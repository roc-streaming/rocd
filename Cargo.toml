[package]
name = "rocd"
version = "0.1.0"
edition = "2024"

[lints.rust]
dead_code = "allow" # TODO: delete me

[lints.clippy]
# https://rust-lang.github.io/rust-clippy/
let_and_return = "allow"
redundant_closure = "allow"
upper_case_acronyms = "allow"

[dev-dependencies]
assertables = "9.5.1"
tempfile = "3.19.1"
tracing-test = "0.2.5"

[dependencies]
derive_builder = "0.20.2"
quick_cache = "0.6.12"
redb = "2.4.0"
rmp-serde = "1.3.0"
thiserror = "2.0.12"

[dependencies.clap]
version = "4.5"
default-features = false
features = ["std", "help", "usage", "error-context", "derive", "wrap_help"]

[dependencies.regex]
version = "1.11.1"

[dependencies.regex_static]
version = "0.1.1"

[dependencies.salvo]
version = "0.77"
features = ["logging", "oapi"]

[dependencies.salvo-craft-macros]
version = "0.77.1"

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.serde_json]
version = "1.0"

[dependencies.tokio]
version = "1"
features = ["full"]

[dependencies.tracing]
version = "0.1"

[dependencies.tracing-subscriber]
version = "0.3"

[dependencies.validator]
version = "0.20.0"
features = ["derive"]
